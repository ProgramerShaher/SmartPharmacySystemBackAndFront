<p-dialog [header]="batch ? 'تعديل دفعة: ' + medicineName : 'إضافة دفعة جديدة: ' + medicineName" 
    [(visible)]="visible" 
    (onHide)="close()"
    [modal]="true" 
    [style]="{width: '500px'}" 
    [draggable]="false" 
    [resizable]="false" 
    styleClass="p-fluid">

    <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-column gap-3 mt-3">
        
        <!-- Company Batch Number -->
        <div class="field">
            <label class="font-bold block mb-2 required">رقم الدفعة (التشغيلة)</label>
            <input pInputText formControlName="companyBatchNumber" placeholder="مثال: LOT-123" />
            <small *ngIf="form.get('companyBatchNumber')?.invalid && form.get('companyBatchNumber')?.touched" class="p-error block">
                رقم الدفعة مطلوب
            </small>
        </div>

        <!-- Expiry Date -->
        <div class="field">
            <label class="font-bold block mb-2 required">تاريخ الانتهاء</label>
            <p-calendar formControlName="expiryDate" appendTo="body" dateFormat="yy-mm-dd" [showIcon]="true" placeholder="YYYY-MM-DD"></p-calendar>
            <small *ngIf="form.get('expiryDate')?.invalid && form.get('expiryDate')?.touched" class="p-error block">
                تاريخ الانتهاء مطلوب
            </small>
        </div>

        <div class="formgrid grid">
            <!-- Quantity (Only for new) -->
            <div class="field col-12 md:col-6" *ngIf="!batch">
                <label class="font-bold block mb-2 required">الكمية الأولية</label>
                <p-inputNumber formControlName="quantity" mode="decimal" [min]="1" [showButtons]="true"></p-inputNumber>
            </div>

            <!-- Storage Location -->
            <div class="field col-12 md:col-6">
                <label class="font-bold block mb-2">موقع التخزين</label>
                <input pInputText formControlName="storageLocation" placeholder="رف A-1" />
            </div>
        </div>

        <div class="formgrid grid">
            <!-- Unit Cost -->
            <div class="field col-12 md:col-6">
                <label class="font-bold block mb-2 required">سعر الشراء (للوحدة)</label>
                <p-inputNumber formControlName="unitPurchasePrice" mode="currency" currency="YER" [min]="0"></p-inputNumber>
            </div>

            <!-- Sale Price -->
            <div class="field col-12 md:col-6">
                <label class="font-bold block mb-2 required">سعر البيع (للجمهور)</label>
                <p-inputNumber formControlName="retailPrice" mode="currency" currency="YER" [min]="0"></p-inputNumber>
            </div>
        </div>

        <!-- Barcode -->
        <div class="field">
            <label class="font-bold block mb-2">باركود خاص بالدفعة (اختياري)</label>
            <input pInputText formControlName="batchBarcode" placeholder="اتركه فارغاً لاستخدام باركود الدواء" />
        </div>

    </form>

    <ng-template pTemplate="footer">
        <button pButton label="إلغاء" icon="pi pi-times" class="p-button-text text-red-500" (click)="close()"></button>
        <button pButton label="حفظ البيانات" icon="pi pi-check" class="p-button-raised p-button-success" 
            (click)="save()" [loading]="loading()"></button>
    </ng-template>

</p-dialog>
