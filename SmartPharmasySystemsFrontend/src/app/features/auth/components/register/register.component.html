<div class="auth-wrapper" dir="rtl">
    <p-toast></p-toast>

    <section class="auth-card">
        <div class="card-accent"></div>

        <div class="auth-header">
            <div class="icon-box">
                <i class="pi pi-user-plus"></i>
            </div>
            <div>
                <h1>إنشاء حساب</h1>
                <p>املأ البيانات الأساسية فقط</p>
            </div>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
            <label class="field-label">الاسم الكامل</label>
            <span class="p-input-icon-left w-full">
                <i class="pi pi-id-card"></i>
                <input pInputText formControlName="fullName" placeholder="اسمك الكامل" />
            </span>

            <label class="field-label">اسم المستخدم</label>
            <span class="p-input-icon-left w-full">
                <i class="pi pi-user"></i>
                <input pInputText formControlName="username" placeholder="اسم المستخدم" />
            </span>

            <label class="field-label">البريد الإلكتروني</label>
            <span class="p-input-icon-left w-full">
                <i class="pi pi-envelope"></i>
                <input pInputText formControlName="email" placeholder="name@example.com" />
            </span>

            <label class="field-label">كلمة المرور</label>
            <span class="p-input-icon-left w-full">
                <i class="pi pi-lock"></i>
                <p-password formControlName="password" placeholder="6 أحرف على الأقل" [toggleMask]="true"
                    [feedback]="false" styleClass="w-full" inputStyleClass="w-full"></p-password>
            </span>

            <div class="terms-row">
                <p-checkbox formControlName="agreeTerms" [binary]="true" inputId="terms"></p-checkbox>
                <label for="terms">أوافق على الشروط والأحكام</label>
            </div>

            <p-button type="submit" label="إنشاء الحساب" icon="pi pi-check" [loading]="loading"
                [disabled]="registerForm.invalid" styleClass="auth-submit w-full"></p-button>
        </form>

        <div class="auth-footer">
            لديك حساب بالفعل؟
            <a routerLink="/auth/login">تسجيل الدخول</a>
        </div>
    </section>
</div>
