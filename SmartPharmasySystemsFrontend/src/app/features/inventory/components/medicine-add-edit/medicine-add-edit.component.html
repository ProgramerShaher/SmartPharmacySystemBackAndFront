<p-dialog [(visible)]="visible" (onHide)="close()" [modal]="true" [draggable]="false" [resizable]="false"
    [style]="{ width: 'min(94vw, 980px)' }" styleClass="medicine-dialog" [breakpoints]="{'960px': '94vw', '640px': '96vw'}"
    [showHeader]="false" [closable]="true" maskStyleClass="backdrop-blur-sm bg-black-alpha-40">

    <div class="modal-shell" dir="rtl">
        <div class="modal-header">
            <div class="modal-title">
                <span class="modal-icon">
                    <i class="pi" [ngClass]="medicine ? 'pi-pencil' : 'pi-plus'"></i>
                </span>
                <div>
                    <h2>{{ medicine ? 'تعديل الدواء' : 'إضافة دواء جديد' }}</h2>
                    <p>بيانات المنتج والتسعير والمخزون في شاشة واحدة</p>
                </div>
            </div>

            <button pButton icon="pi pi-times" class="p-button-rounded p-button-text p-button-secondary close-btn"
                (click)="close()"></button>
        </div>

        <form [formGroup]="medicineForm" class="modal-body p-fluid">
            <aside class="media-panel">
                <div class="image-frame">
                    <img *ngIf="medicineForm.get('imageUrl')?.value" [src]="medicineForm.get('imageUrl')?.value"
                        class="w-full h-full object-cover" />
                    <div *ngIf="!medicineForm.get('imageUrl')?.value" class="image-empty">
                        <i class="pi pi-image"></i>
                        <span>صورة المنتج</span>
                    </div>
                    <label for="imageUpload" class="upload-btn">
                        <i class="pi" [ngClass]="uploading() ? 'pi-spin pi-spinner' : 'pi-camera'"></i>
                    </label>
                    <input type="file" id="imageUpload" class="hidden" accept="image/*" (change)="onFileSelected($event)"
                        [disabled]="uploading()" />
                </div>

                <div class="side-note">
                    <i class="pi pi-info-circle"></i>
                    <span>املأ الحقول المهمة فقط، ويمكن تعديل البقية لاحقاً.</span>
                </div>

                <div class="unit-check">
                    <p-checkbox formControlName="soldByUnit" [binary]="true" inputId="soldByUnit"
                        styleClass="p-checkbox-sm"></p-checkbox>
                    <label for="soldByUnit">يباع بالوحدة</label>
                </div>
            </aside>

            <section class="fields-panel">
                <div class="section-label">المعلومات الأساسية</div>

                <div class="form-grid">
                    <div class="form-field span-2">
                        <label class="required-star">الاسم التجاري</label>
                        <input pInputText formControlName="name"
                            [ngClass]="{'ng-invalid ng-dirty': medicineForm.get('name')?.invalid && medicineForm.get('name')?.touched}" />
                    </div>

                    <div class="form-field">
                        <label>التصنيف</label>
                        <p-dropdown [options]="categories()" formControlName="categoryId" optionLabel="name"
                            optionValue="id" placeholder="اختر..." [filter]="true" [showClear]="true" appendTo="body"
                            styleClass="w-full"></p-dropdown>
                    </div>

                    <div class="form-field">
                        <label>الكود</label>
                        <input pInputText formControlName="internalCode" placeholder="تلقائي" />
                    </div>

                    <div class="form-field">
                        <label>الباركود</label>
                        <span class="p-input-icon-left w-full">
                            <i class="pi pi-barcode"></i>
                            <input pInputText formControlName="defaultBarcode" />
                        </span>
                    </div>

                    <div class="form-field">
                        <label>الشركة</label>
                        <input pInputText formControlName="manufacturer" />
                    </div>

                    <div class="form-field span-2">
                        <label>الاسم العلمي</label>
                        <input pInputText formControlName="scientificName" />
                    </div>

                    <div class="form-field" *ngIf="medicine">
                        <label>الحالة</label>
                        <p-dropdown [options]="statusOptions" formControlName="status" optionLabel="label"
                            optionValue="value" appendTo="body" styleClass="w-full"></p-dropdown>
                    </div>
                </div>

                <div class="section-label">التسعير والمخزون</div>

                <div class="form-grid compact">
                    <div class="form-field">
                        <label class="required-star">سعر الشراء</label>
                        <p-inputNumber formControlName="defaultPurchasePrice" mode="decimal" [minFractionDigits]="0"
                            [maxFractionDigits]="2" suffix=" ر.ي" class="w-full"></p-inputNumber>
                    </div>

                    <div class="form-field">
                        <label class="required-star">سعر البيع</label>
                        <p-inputNumber formControlName="defaultSalePrice" mode="decimal" [minFractionDigits]="0"
                            [maxFractionDigits]="2" suffix=" ر.ي" class="w-full"></p-inputNumber>
                    </div>

                    <div class="form-field">
                        <label>الحد الأدنى</label>
                        <p-inputNumber formControlName="minAlertQuantity" [min]="0" class="w-full"></p-inputNumber>
                    </div>

                    <div class="form-field">
                        <label>إعادة الطلب</label>
                        <p-inputNumber formControlName="reorderLevel" [min]="0" class="w-full"></p-inputNumber>
                    </div>

                    <div class="form-field span-2">
                        <label>ملاحظات</label>
                        <textarea pInputTextarea formControlName="notes" rows="2"></textarea>
                    </div>
                </div>
            </section>
        </form>

        <div class="modal-footer">
            <span><i class="pi pi-shield"></i> يتم حفظ البيانات بعد التحقق من الحقول المطلوبة</span>
            <div class="footer-actions">
                <button pButton label="إلغاء" class="p-button-text p-button-secondary" (click)="close()"></button>
                <button pButton [label]="medicine ? 'حفظ التعديل' : 'إضافة الدواء'" icon="pi pi-check" iconPos="right"
                    class="save-btn" [loading]="loading()" (click)="save()" [disabled]="medicineForm.invalid"></button>
            </div>
        </div>
    </div>
</p-dialog>
