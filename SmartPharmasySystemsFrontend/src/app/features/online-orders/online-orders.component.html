<div class="container-fluid py-4">
  <div class="card shadow-lg border-0 bg-glass">
    <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center">
      <h2 class="text-primary mb-0"><i class="fas fa-shopping-cart mr-2"></i> طلبات الأونلاين</h2>
      <button class="btn btn-outline-primary" (click)="loadOrders()">
        <i class="fas fa-sync-alt" [class.fa-spin]="loading"></i> تحديث
      </button>
    </div>
    
    <div class="card-body">
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">جاري تحميل الطلبات...</p>
      </div>

      <div *ngIf="!loading && orders.length === 0" class="text-center py-5">
        <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
        <p class="text-muted">لا توجد طلبات أونلاين حالياً</p>
      </div>

      <div class="table-responsive" *ngIf="!loading && orders.length > 0">
        <table class="table table-hover align-items-center">
          <thead class="thead-light">
            <tr>
              <th>رقم الطلب</th>
              <th>التاريخ</th>
              <th>العميل</th>
              <th>المبلغ</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let order of orders">
              <td><strong>{{ order.orderNumber }}</strong></td>
              <td>{{ order.orderDate | date:'short' }}</td>
              <td>
                <div>{{ order.customerName }}</div>
                <small class="text-muted">{{ order.customerPhone }}</small>
              </td>
              <td><span class="text-success font-weight-bold">{{ order.totalAmount }} ريال</span></td>
              <td>
                <span class="badge badge-pill" [ngClass]="getStatusClass(order.statusCode)">
                  {{ order.status }}
                </span>
              </td>
              <td>
                <div class="btn-group">
                  <button *ngIf="order.statusCode === 1" class="btn btn-sm btn-success" (click)="updateStatus(order, 2)">
                    قبول وتجهيز
                  </button>
                  <button *ngIf="order.statusCode === 2" class="btn btn-sm btn-primary" (click)="updateStatus(order, 3)">
                    خروج للتوصيل
                  </button>
                  <button *ngIf="order.statusCode === 3" class="btn btn-sm btn-info" (click)="updateStatus(order, 4)">
                    تم التسليم
                  </button>
                  <button *ngIf="order.statusCode === 1" class="btn btn-sm btn-danger" (click)="updateStatus(order, 6)">
                    رفض
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
