<div class="login-wrapper" dir="rtl">
    <p-toast></p-toast>

    <section class="login-card">
        <div class="card-accent"></div>

        <div class="login-header">
            <div class="logo-box">
                <i class="pi pi-shield"></i>
            </div>
            <div>
                <h1>تسجيل الدخول</h1>
                <p>مرحباً بك في الصيدلية الذكية</p>
            </div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <label class="field-label" for="username">اسم المستخدم</label>
            <span class="p-input-icon-left w-full">
                <i class="pi pi-user"></i>
                <input pInputText id="username" formControlName="username" placeholder="مثال: admin"
                    autocomplete="username" />
            </span>

            <label class="field-label" for="password">كلمة المرور</label>
            <span class="p-input-icon-left w-full">
                <i class="pi pi-lock"></i>
                <p-password inputId="password" formControlName="password" placeholder="اكتب كلمة المرور"
                    [toggleMask]="true" [feedback]="false" styleClass="w-full" inputStyleClass="w-full"
                    autocomplete="current-password"></p-password>
            </span>

            <div class="form-row">
                <div class="remember">
                    <p-checkbox formControlName="rememberMe" [binary]="true" inputId="rem"></p-checkbox>
                    <label for="rem">تذكرني</label>
                </div>
                <a class="muted-link">نسيت كلمة المرور؟</a>
            </div>

            <p-button type="submit" label="دخول" icon="pi pi-sign-in" [loading]="loading"
                [disabled]="loginForm.invalid" styleClass="auth-submit w-full"></p-button>

            <div class="quick-actions">
                <button type="button" class="quick-login-btn admin" (click)="quickLogin('admin')">
                    <i class="pi pi-user-edit"></i>
                    <span>مدير</span>
                </button>
                <button type="button" class="quick-login-btn pharmacist" (click)="quickLogin('pharmacist')">
                    <i class="pi pi-user"></i>
                    <span>صيدلي</span>
                </button>
            </div>
        </form>

        <div class="login-footer">
            ليس لديك حساب؟
            <a routerLink="/auth/register">إنشاء حساب جديد</a>
        </div>
    </section>
</div>
