<div class="category-modal" dir="rtl">
    <div class="modal-header">
        <div class="modal-title">
            <span class="modal-icon">
                <i class="pi pi-tags"></i>
            </span>
            <div>
                <h2>{{ editMode ? 'تعديل بيانات الفئة' : 'إضافة فئة جديدة' }}</h2>
                <p *ngIf="editMode">تعديل بيانات: {{ categoryData?.name }}</p>
                <p *ngIf="!editMode">تصنيف جديد يساعد في ترتيب المنتجات والبحث عنها</p>
            </div>
        </div>

        <button pButton icon="pi pi-times" class="p-button-rounded p-button-text p-button-secondary close-btn"
            (click)="cancel()"></button>
    </div>

    <form [formGroup]="categoryForm" class="modal-body p-fluid">
        <aside class="image-panel">
            <div class="category-image">
                <img *ngIf="categoryForm.get('imageUrl')?.value" [src]="categoryForm.get('imageUrl')?.value"
                    class="w-full h-full object-cover" />
                <i *ngIf="!categoryForm.get('imageUrl')?.value" class="pi pi-briefcase"></i>
                <label for="categoryImageUpload" class="upload-btn">
                    <i class="pi" [ngClass]="uploading ? 'pi-spin pi-spinner' : 'pi-camera'"></i>
                </label>
                <input type="file" id="categoryImageUpload" class="hidden" accept="image/*"
                    (change)="onFileSelected($event)" [disabled]="uploading" />
            </div>
            <span>أيقونة الصنف</span>
        </aside>

        <section class="fields-panel">
            <div class="form-field">
                <label class="required-label">اسم الفئة</label>
                <span class="p-input-icon-left w-full">
                    <i class="pi pi-tag"></i>
                    <input pInputText formControlName="name" placeholder="مثلاً: مضادات حيوية، مسكنات..."
                        [ngClass]="{'ng-invalid ng-dirty': name.invalid && name.touched}" />
                </span>
                <small *ngIf="name.invalid && name.touched" class="p-error block mt-1">
                    <ng-container *ngIf="name.errors?.['required']">اسم الفئة مطلوب</ng-container>
                    <ng-container *ngIf="name.errors?.['minlength']">يجب أن يحتوي الاسم على حرفين على الأقل</ng-container>
                </small>
            </div>

            <div class="form-field">
                <label>الوصف (اختياري)</label>
                <textarea pInputTextarea formControlName="description" rows="3"
                    placeholder="اكتب وصفاً مختصراً للفئة..." [autoResize]="false"></textarea>
                <small class="counter">{{ description.value?.length || 0 }}/500</small>
            </div>
        </section>
    </form>

    <div class="modal-footer">
        <span><i class="pi pi-info-circle"></i> حافظ على اسم واضح وقصير للتصنيف</span>
        <div class="footer-actions">
            <button pButton label="إلغاء" class="p-button-text p-button-secondary" (click)="cancel()"></button>
            <button pButton [label]="saving ? 'جاري الحفظ...' : (editMode ? 'حفظ التعديلات' : 'إضافة الفئة')"
                icon="pi pi-check" class="save-btn" (click)="saveCategory()"
                [disabled]="categoryForm.invalid || saving" [loading]="saving"></button>
        </div>
    </div>
</div>
